  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r:pointer;\" style-hover=\"{{ statsBtnHover }}\" style-active=\"{{ statsBtnActive }}\">\n          <span style=\"display:flex; align-items:flex-end; gap:2.5px;\">\n            <span style=\"display:block; width:4px; height:8px; border-radius:2px; background:#B9A8F4;\"><\u002Fspan>\n            <span style=\"display:block; width:4px; height:14px; border-radius:2px; background:#8971FF;\"><\u002Fspan>\n            <span style=\"display:block; width:4px; height:11px; border-radius:2px; background:#F5A623;\"><\u002Fspan>\n          <\u002Fspan>\n          STATS\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;cols&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 5, &quot;min&quot;: 4, &quot;max&quot;: 9, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Board&quot; },\n  &quot;rows&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 6, &quot;min&quot;: 4, &quot;max&quot;: 14, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Board&quot; },\n  &quot;gameSeconds&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 120, &quot;min&quot;: 30, &quot;max&quot;: 300, &quot;step&quot;: 10, &quot;unit&quot;: &quot;s&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Difficulty&quot; },\n  &quot;dropSeconds&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 10, &quot;min&quot;: 5, &quot;max&quot;: 30, &quot;step&quot;: 1, &quot;unit&quot;: &quot;s&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Difficulty&quot; }\n}\">\nconst PALETTE = [\n  { bg: '#A78BFA', hi: '#BBA5FC', edge: '#7C5CE0' }, // brand violet\n  { bg: '#5BC8F5', hi: '#7DD6F8', edge: '#2E9FD0' }, // brand cyan\n  { bg: '#5FD6A8', hi: '#80E1BB', edge: '#38AD7F' }, // mint\n  { bg: '#F58FB8', hi: '#F8ABC9', edge: '#D06090' }, // pink\n  { bg: '#F5B84A', hi: '#F8CA74', edge: '#CE9022' }, // amber\n  { bg: '#F58A66', hi: '#F8A588', edge: '#CC5F3D' }, // coral\n];\nconst VALUES = { a:1,b:3,c:3,d:2,e:1,f:4,g:2,h:4,i:1,j:8,k:5,l:1,m:3,n:1,o:1,p:3,q:10,r:1,s:1,t:1,u:1,v:4,w:4,x:8,y:4,z:10 };\n// drifting background tiles: fixed table (stable across renders), hugging the screen edges\nconst FLOATERS = [\n  { x: 4, y: 12, s: 26, c: 0, d: 13 }, { x: 9, y: 34, s: 16, c: 2, d: 17 },\n  { x: 3, y: 58, s: 34, c: 1, d: 15 }, { x: 11, y: 80, s: 20, c: 4, d: 19 },\n  { x: 91, y: 9, s: 22, c: 3, d: 16 }, { x: 95, y: 30, s: 30, c: 5, d: 14 },\n  { x: 89, y: 55, s: 16, c: 0, d: 18 }, { x: 94, y: 78, s: 26, c: 2, d: 13.5 },\n  { x: 22, y: 5, s: 14, c: 5, d: 16.5 }, { x: 74, y: 4, s: 18, c: 1, d: 15.5 },\n  { x: 30, y: 92, s: 16, c: 3, d: 17.5 }, { x: 68, y: 94, s: 22, c: 0, d: 14.5 },\n];\nconst BAG = 'eeeeeeeeeeeeaaaaaaaaaiiiiiiiiioooooooonnnnnnrrrrrrttttttllllssssuuuuddddgggbbccmmppffhhvvwwyykjxqz';\nconst VOWELS = 'aaeeeeiiou';\n// commons-heavy bag for the early-round on-ramp: words practically deal themselves\nconst FRIENDLY = 'eeeeeaaaaiiooonnnrrrtttlllssseuhdcmpbg';\nconst SHARE_URL = 'https://soomerlabs.github.io/sworble/';\n// Leaderboard swap point: set LB_REMOTE to the Soomer API base to go live;\n// while empty, a local stub persists the player's own best + seeds competitors.\nconst LB_REMOTE = '';\nconst LS = (() => { try { const t = window.localStorage; t.setItem('__ls_t', '1'); t.removeItem('__ls_t'); return t; } catch (e) { const m = {}; return { getItem: k => (Object.prototype.hasOwnProperty.call(m, k) ? m[k] : null), setItem: (k, v) => { m[k] = String(v); }, removeItem: k => { delete m[k]; }, key: i => Object.keys(m)[i] || null, get length() { return Object.keys(m).length; } }; } })(); // storage-blocked contexts (zip/mail/Drive previews, some private modes) throw on ANY localStorage touch - fall back to in-memory so the game still runs\n// public-name profanity gate (display names are shown to everyone)\nconst FOUL = ['nig','negro','fag','kike','spic','chink','gook','coon','dyke','trann','cunt','fuck','shit','rape','nazi','jap','slut','whore','homo','tard','cock','dick','piss','anus','sex','damn'];\n// deterministic RNG for daily mode — same seed, same letters, everywhere\nfunction shuffledBag(str, rng) {\n  const a = str.split('');\n  for (let i = a.length - 1; i > 0; i--) {\n    const j = Math.floor(rng() * (i + 1));\n    [a[i], a[j]] = [a[j], a[i]];\n  }\n  return a;\n}\nfunction mulberry32(seed) {\n  return function() {\n    seed |= 0; seed = seed + 0x6D2B79F5 | 0;\n    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);\n    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;\n    return ((t ^ t >>> 14) >>> 0) / 4294967296;\n  };\n}\n\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.boardRef = React.createRef();\n    this.dropBarRef = React.createRef();\n    this.sparkRef = React.createRef();\n    this.hopperRowRef = React.createRef();\n    this.boardCardRef = React.createRef();\n    this.sheetRef = React.createRef();\n    this.rand = Math.random; // daily mode swaps in a seeded generator\n    try { this.bestWordEver = JSON.parse(LS.getItem('stackle_bestword') || 'null'); } catch (e) { this.bestWordEver = null; }\n    try { this.wordsTotal = parseInt(LS.getItem('stackle_words_total') || '0', 10) || 0; } catch (e) { this.wordsTotal = 0; }\n    try { this.playerName = LS.getItem('stackle_name') || ''; } catch (e) { this.playerName = ''; }\n    this.dailyKey = this.dayKey(new Date()); // today's key must exist BEFORE the first newGame — the home-screen header reads today's best from it\n    // one-time heal: older builds could save a result under an \"undefined\" (unset dailyKey) or\n    // otherwise malformed day key, which pollutes DAYS PLAYED / streaks with a phantom day.\n    try {\n      const validDay = /^\\d{4}-\\d{2}-\\d{2}$/;\n      const kill = [];\n      for (let i = 0; i < LS.length; i++) {\n        const k = LS.key(i); if (!k) continue;\n        if (k.indexOf('stackle_daily_') === 0 && !validDay.test(k.slice(14))) kill.push(k);\n        else if (k.indexOf('stackle_att_') === 0 && !validDay.test(k.slice(12))) kill.push(k);\n      }\n      kill.forEach(k => LS.removeItem(k));\n    } catch (e) {}\n    this.engineQ = []; // cycle events (sounds + cascades) processed by the rAF engine loop\n    this.prefersDark = (() => { try { return window.matchMedia('(prefers-color-scheme: dark)').matches; } catch (e) { return false; } })();\n    this.dict = null;\n    this.hintDict = null;\n    this.prefixes = new Set();\n    this.dragging = false;\n    this.tileSeq = 1;\n    this.bannerSeq = 0;\n    this.timeouts = [];\n    this.ac = null;\n    let best = 0, muted = false, opts = {};\n    try {\n      best = parseInt(LS.getItem('worddrop_best') || '0', 10) || 0;\n      // sound is experimental: OFF by default until the user opts in\n      const mutedLS = LS.getItem('worddrop_muted');\n      muted = mutedLS == null ? true : mutedLS === '1';\n      opts = JSON.parse(LS.getItem('stackle_opts') || '{}') || {};\n      // one-time migration: the 5-column default supersedes previously auto-saved cols\n      if (!opts.g2) {\n        delete opts.cols;\n        opts.g2 = 1;\n        LS.setItem('stackle_opts', JSON.stringify(opts));\n      }\n    } catch (e) {}\n    // first-launch onboarding: show how-to once, then never again\n    let firstRun = false;\n    try {\n      firstRun = !LS.getItem('stackle_seen_howto');\n      if (firstRun) LS.setItem('stackle_seen_howto', '1');\n      // \"what's new\" replay: mines shipped — players who saw the OLD how-to get the\n      // updated sheet once on their next play; new players are covered by firstRun\n      if (!firstRun && !LS.getItem('stackle_seen_mines')) firstRun = true;\n      LS.setItem('stackle_seen_mines', '1');\n    } catch (e) {}\n    this.firstRun = firstRun;\n    this.firstRunPending = firstRun; // intro cascade replays after the how-to closes\n    this.initOpts = opts;\n    this.state = {\n      tiles: [], nextRow: [], score: 0, best,\n      dropStamp: 0, prog: 0, paused: false, over: false, dropSoon: false,\n      path: [], banner: null, streak: 0, maxStreak: 0,\n      scoreShown: 0, bestLit: false, roundWords: [], burstFx: [],\n      nextFresh: false, muted, opts, showSettings: false, showInfo: false, showStats: false,\n      showLb: false, showName: false, lbData: null, nameInput: '', nameError: '', sheetH: 0,\n      screen: 'home',\n      dictNote: 'loading dictionary\\u2026',\n      tileSize: this.initialSize(props), vw: window.innerWidth,\n      dropMs: ((opts.dropSeconds ?? (props && props.dropSeconds)) || 10) * 1000,\n      timeLeft: ((opts.gameSeconds ?? (props && props.gameSeconds)) || 120),\n    };\n  }\n\n  initialSize(props) {\n    // computed synchronously so the very first paint is already the right size (no resize jump)\n    const cols = Math.max(4, Math.min(9, Math.round((props && props.cols) ?? 5)));\n    const rows = Math.max(4, Math.min(14, Math.round((props && props.rows) ?? 6)));\n    const vw = window.innerWidth;\n    // 16px gutters each side AFTER the card's own 24px of rail padding —\n    // sizing from the tiles alone let the rail eat the gutters\n    const maxW = Math.min(vw - (vw < 640 ? 56 : 76), 470);\n    const maxH = Math.max(240, window.innerHeight - (vw < 640 ? 300 : 378));\n    return Math.max(30, Math.min(64, Math.min(\n      Math.floor(maxW / (cols + (cols - 1) * 0.16)),\n      Math.floor(maxH / (rows + (rows - 1) * 0.16))\n    )));\n  }\n\n  optVal(k, dflt) {\n    const o = (this.state && this.state.opts) || this.initOpts || {};\n    return o[k] ?? this.props[k] ?? dflt;\n  }\n  // fade-out for sheet dismissal: keep the sheet mounted, drop scrim opacity to 0,\n  // then apply the real state change once the 200ms transition has finished\n  fadeClose(patch, after) {\n    try { if (document.activeElement && document.activeElement.blur) document.activeElement.blur(); } catch (e) {} // c p((e, i) => ({ ...e, rank: i + 1 }));\n    const TOP = 12;\n    const youRank = me ? (ranked.find(e => e.you) || {}).rank : null;\n    const youInTop = me && youRank <= TOP;\n    const rowFor = (e) => {\n      const gold = !!e.you;\n      return {\n        rank: '#' + e.rank, name: e.name, score: e.score.toLocaleString(),\n        rowStyle: { display: 'flex', alignItems: 'center', gap: 12, padding: '9px 13px', borderRadius: 12,\n          background: gold ? (dark ? 'rgba(245,166,35,0.16)' : '#FFE9BE') : (dark ? 'rgba(255,255,255,0.035)' : 'rgba(20,16,40,0.03)'),\n          border: '2px solid ' + (gold ? (dark ? 'rgba(245,166,35,0.5)' : '#F5C97A') : 'transparent') },\n        rankStyle: { fontFamily: \"'Fredoka','Manrope',sans-serif\", fontSize: 15, fontWeight: 600, width: 32, flexShrink: 0, color: e.rank <= 3 ? '#F5A623' : 'var(--ghost)' },\n        nameStyle: { flex: 1, fontSize: 14.5, fontWeight: 800, letterSpacing: '0.5px', color: gold ? (dark ? '#F5C97A' : '#8F6400') : 'var(--sheet-ink)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' },\n        scoreStyle: { fontFamily: \"'Fredoka','Manrope',sans-serif\", fontSize: 17, fontWeight: 600, color: gold ? (dark ? '#F5C97A' : '#8F6400') : 'var(--sheet-ink)' }\n      };\n    };\n    return {\n      lbLoading: false, lbReady: true, lbDateLabel: dayLabel,\n      lbCount: (data.count || ranked.length) + ' playing today',\n      lbList: ranked.slice(0, TOP).map(rowFor),\n      lbYouRow: (me && !youInTop) ? rowFor(ranked.find(e => e.you)) : null,\n      lbNotSubmitted: !me\n    };\n  }\n  dailyHistory() {\n    const h = {};\n    try {\n      for (let i = 0; i < LS.length; i++) {\n        const key = LS.key(i);\n        if (key && key.indexOf('stackle_daily_') === 0) {\n          const day = key.slice('stackle_daily_'.length);\n          const v = parseInt(LS.getItem(key) || '0', 10) || 0;\n          if (v > 0) h[day] = v;\n        }\n      }\n    } catch (e) {}\n    return h;\n  }\n  computeStreak(hist)
