# Runs the full test suite (determinism contract, status selector, store/migration,
# run snapshots) on every push. Pages deploys straight from main, so
# this is the only gate between a push and production — keep it green.
name: test
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # RN 0.86/Metro tooling floor
      - run: npm ci   # eslint is the repo's first devDependency (lint gates npm test)
      - run: npm test
      # Coverage over the 9 pure kernel modules only — index.html's inline DC script isn't
      # required by any test file, so c8 never sees it (that's "pure-module coverage", not
      # whole-app coverage; see the coverage script's own comment in package.json for why).
      # Reports the real number every run; NOT a gate yet (`|| true` — Road-to-9 Sprint 1 #1:
      # publish honest numbers first, decide a threshold once the number is stable).
      - run: npm run coverage || true
      # BUNDLE SMOKE (audit follow-up): a full web export of the RN app catches
      # import/asset/metro breakage that logic tests can't — the closest thing
      # to a boot test until a jest+RNTL render smoke earns its setup cost.
      - run: cd apps/sworbl && npx expo export --platform web
