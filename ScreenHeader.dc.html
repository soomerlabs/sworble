<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="width:100%; box-sizing:border-box;">
  <div style="margin-top:8px;">
    <div style="display:flex; flex-direction:column; gap:4px;">
      <div style="font-size:10px; font-weight:800; letter-spacing:2.5px; color:var(--ghost); text-transform:uppercase;">{{ eyebrow }}</div>
      <div style="display:flex; flex-wrap:wrap; align-items:baseline; gap:9px;">
        <span style="font-family:'Fredoka','Manrope',sans-serif; font-size:31px; font-weight:600; line-height:1.05; color:var(--sheet-ink); white-space:nowrap;">{{ title }}</span>
        <sc-if value="{{ hasAccent }}" hint-placeholder-val="{{ false }}"><span style="font-family:'Fredoka','Manrope',sans-serif; font-size:31px; font-weight:600; line-height:1.05; color:#8971FF; white-space:nowrap;">{{ titleAccent }}</span></sc-if>
      </div>
    </div>
    <div style="height:1.5px; background:var(--line); margin-top:13px;"></div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:340,&quot;height&quot;:96},&quot;leftGlyph&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;arrow_back&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onLeft&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;leftAria&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;rightGlyph&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onRight&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;rightAria&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;eyebrow&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;EYEBROW&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Title&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;titleAccent&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props || {};
    return {
      leftGlyph: p.leftGlyph || 'arrow_back',
      onLeft: typeof p.onLeft === 'function' ? p.onLeft : (() => {}),
      leftAria: p.leftAria || '',
      rightGlyph: p.rightGlyph || '',
      onRight: typeof p.onRight === 'function' ? p.onRight : (() => {}),
      rightAria: p.rightAria || '',
      eyebrow: p.eyebrow || '',
      title: p.title || '',
      titleAccent: p.titleAccent || '',
      hasAccent: !!p.titleAccent,
    };
  }
}
</script>
</body>
</html>
